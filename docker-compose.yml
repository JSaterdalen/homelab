version: "3.6"
services:
  portainer:
    image: portainer/portainer
    container_name: portainer
    restart: always
    command: -H unix:///var/run/docker.sock
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${USERDIR}/docker/portainer/data:/data
      - ${USERDIR}/docker/shared:/shared
    environment:
      - TZ=${TZ}

  unifi-controller:
    image: linuxserver/unifi-controller
    container_name: unifi-controller
    network_mode: host
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - MEM_LIMIT=1024M #optional
    volumes:
      - ${USERDIR}/docker/unifi:/config
    ports:
      - 3478:3478/udp
      - 10001:10001/udp
      - 8080:8080
      - 8443:8443
      - 1900:1900/udp #optional
      - 8843:8843 #optional
      - 8880:8880 #optional
      - 6789:6789 #optional
      - 5514:5514 #optional
    restart: unless-stopped
  
  unifi-video-controller:
    image: pducharme/unifi-video-controller:latest
    container_name: unifi-video-controller
    restart: always
    network_mode: host 
    ports:
      - 1935:1935
      - 6666:6666
      - 7004:7004
      - 7080:7080
      - 7442:7442
      - 7443:7443
      - 7444:7444
      - 7445:7445
      - 7446:7446
      - 7447:7447
    volumes:
      - ${USERDIR}/docker/unifi-video:/var/lib/unifi-video
      - /mnt/video/unifi-video/videos:/var/lib/unifi-video/videos
    environment:
      - TZ=${TZ}
      - DEBUG=1
      - PUID=${PUID}
      - PGID=${PGID}
      - CREATE_TMPFS=no
    cap_add:
      - DAC_READ_SEARCH
    tmpfs:
      - /var/cache/unifi-video
# Uncomment security option below to set apparmor unconfined if "tmpfs is write-protected, mounting read-only" error is seen.
# Known to happen on ubuntu, synology, and other platforms.
    security_opt:
      - apparmor:unconfined

  openvpn-client:
    image: yacht7/openvpn-client
    container_name: openvpn-client
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    volumes:
      - /home/josh/docker/ovpn:/data/vpn
    restart: unless-stopped
    environment: 
      - KILL_SWITCH=on
      - SUBNETS=192.168.1.0/24
      - FORWARDED_PORTS=2970
    ports:
      - 2970:2970
      - 2970:2970/udp
      - 8088:8088
      - 22146:22146
      - 6080:6080

  qbittorrent:
    image: linuxserver/qbittorrent
    container_name: qbittorrent
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - UMASK_SET=022
      - WEBUI_PORT=8088
    volumes:
      - ${HOME}/docker/qBT:/config
      - /mnt/downloads:/downloads
    restart: unless-stopped
    network_mode: service:openvpn-client

  sonarr:
    image: linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      # - UMASK_SET=002 #optional
    volumes:
      - ${HOME}/docker/sonarr:/config
      - ${VIDEO}:/video
      - ${DOWNLOADS}:/downloads
    ports:
      - 8989:8989
    restart: unless-stopped

  nzbget:
    image: linuxserver/nzbget
    container_name: nzbget
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${HOME}/docker/nzbget:/config
      - ${DOWNLOADS}:/downloads
    ports:
      - 9876:6789
    restart: unless-stopped
  
  radarr:
    image: linuxserver/radarr
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      # - UMASK_SET=022 #optional
    volumes:
      - ${HOME}/docker/radarr:/config
      - ${VIDEO}:/video
      - ${DOWNLOADS}:/downloads
    ports:
      - 7878:7878
    restart: unless-stopped

  radarr4k:
    image: linuxserver/radarr
    container_name: radarr4k
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      # - UMASK_SET=022 #optional
    volumes:
      - ${HOME}/docker/radarr4k:/config
      - ${VIDEO}:/video
      - ${DOWNLOADS}:/downloads
    ports:
      - 7880:7880
    restart: unless-stopped

  tautulli:
    image: linuxserver/tautulli
    container_name: tautulli
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${HOME}/docker/tautulli:/config
      - /var/lib/plexmediaserver/Library/Application Support/Plex Media Server/Logs:/logs
    ports:
      - 8181:8181
    restart: unless-stopped

  organizr:
    image: linuxserver/organizr
    container_name: organizr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${HOME}/docker/organizr:/config
    ports:
      - 9983:80
    restart: unless-stopped

  teslamate:
    image: teslamate/teslamate:latest
    container_name: teslamate
    restart: always
    environment:
      - DATABASE_USER=teslamate
      - DATABASE_PASS=secret
      - DATABASE_NAME=teslamate
      - DATABASE_HOST=teslamate_postgres
      - MQTT_HOST=192.168.1.10
      - MQTT_USERNAME=mqtt
      - MQTT_PASSWORD=Bluespacep3nguin
    ports:
      - 4000:4000
    volumes:
      - ./import:/opt/app/import
    cap_drop:
      - all

  teslamate_postgres:
    container_name: teslamate_postgres
    image: postgres:13
    restart: always
    environment:
      - POSTGRES_USER=teslamate
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=teslamate
    volumes:
      - teslamate-db:/var/lib/postgresql/data

  teslamate_grafana:
    image: teslamate/grafana:latest
    container_name: teslamate_grafana
    restart: always
    environment:
      - DATABASE_USER=teslamate
      - DATABASE_PASS=secret
      - DATABASE_NAME=teslamate
      - DATABASE_HOST=teslamate_postgres
    ports:
      - 3000:3000
    volumes:
      - teslamate-grafana-data:/var/lib/grafana

  homeassistant:
    container_name: homeassistant
    image: homeassistant/home-assistant:stable
    volumes:
      - ${HOME}/docker/homeassistant:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
    restart: unless-stopped
    network_mode: host

  deconz:
    container_name: deconz
    network_mode: host
    restart: always
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${HOME}/docker/deconz:/root/.local/share/dresden-elektronik/deCONZ
    devices:
      - /dev/ttyACM0
    image: marthoc/deconz
    environment:
      - DECONZ_WEB_PORT=8484
      - DECONZ_WS_PORT=8585
      - DECONZ_DEVICE=/dev/ttyACM0

  mosquitto:
    image: eclipse-mosquitto
    container_name: mosquitto
    network_mode: host
    restart: always
    ports:
      - 1883:1883
    volumes:
      - ${HOME}/docker/mosquitto/config:/mosquitto/config
      - ${HOME}/docker/mosquitto/data:/mosquitto/data
      - ${HOME}/docker/mosquitto/log:/mosquitto/log

  ring-mqtt:
    image: tsightler/ring-mqtt
    container_name: ring-mqtt
    network_mode: host
    restart: always
    environment:
      - host=192.168.1.6
      - MQTTRINGTOPIC=ring_topic
      - MQTTHASSTOPIC=hass_topic
      - RINGTOKEN=${RINGTOKEN}
      - ENABLECAMERAS=true

  plex:
    image: ghcr.io/linuxserver/plex
    container_name: plex
    network_mode: host
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - VERSION=latest
      # - PLEX_CLAIM= #optional
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ${HOME}/docker/plexmediaserver:/config
      - ${VIDEO}/tv:/tv
      - ${VIDEO}/movies:/movies
      - ${MEDIA}/music:/music
      - ${VIDEO}/movies-4k:/movies-4k
    restart: unless-stopped

volumes:
  teslamate-db:
  teslamate-grafana-data: